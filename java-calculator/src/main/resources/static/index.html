<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Calculator</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="calculator-container">
        <h1>Ahtesham calculator</h1>
        <p class="subtitle">Precision Meets Elegance</p>

        <div class="input-group">
            <input type="number" id="num1" placeholder="Enter first number" required>
        </div>

        <div class="input-group">
            <select id="operation">
                <option value="add">Add (+)</option>
                <option value="subtract">Subtract (−)</option>
                <option value="multiply">Multiply (×)</option>
                <option value="divide">Divide (÷)</option>
            </select>
        </div>

        <div class="input-group">
            <input type="number" id="num2" placeholder="Enter second number" required>
        </div>

        <button onclick="calculate()">Calculate Now</button>

        <div id="result-section" class="result-container" style="display: none;">
            <h3>Result: <span id="result"></span></h3>
        </div>
        
        <div id="error-message" class="error" style="display: none;"></div>
    </div>

    <script>
        function calculate() {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            const operation = document.getElementById('operation').value;
            const resultSection = document.getElementById('result-section');
            const resultSpan = document.getElementById('result');
            const errorDiv = document.getElementById('error-message');

            // Reset UI
            resultSection.style.display = 'none';
            errorDiv.style.display = 'none';

            if (!num1 || !num2) {
                errorDiv.innerText = "Please enter both numbers.";
                errorDiv.style.display = 'block';
                return;
            }

            const url = `/calculator/api/calculate?num1=${num1}&num2=${num2}&operation=${operation}`;

            fetch(url)
                .then(response => {
                    if (!response.ok) {
                        return response.text().then(text => { throw new Error(text) });
                    }
                    return response.json();
                })
                .then(data => {
                    resultSpan.innerText = data.result;
                    resultSection.style.display = 'block';
                })
                .catch(error => {
                    errorDiv.innerText = error.message;
                    errorDiv.style.display = 'block';
                });
        }
    </script>
</body>

</html>
