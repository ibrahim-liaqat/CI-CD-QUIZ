<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>my calculator </title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="calculator-container">
        <h1>Molla bhai cal 45</h1>
        <p class="subtitle">Hi hi</p>

        <div class="input-group">
            <input type="number" id="num1" placeholder="First Number" required>
        </div>

        <div class="input-group">
            <select id="operation">
                <option value="add">+</option>
                <option value="subtract">-</option>
                <option value="multiply">×</option>
                <option value="divide">÷</option>
            </select>
        </div>

        <div class="input-group">
            <input type="number" id="num2" placeholder="Second Number" required>
        </div>

        <button onclick="calculate()">Calculate</button>

        <div class="result-container" id="result-container" style="display: none;">
            <h3>Result: <span id="result-value"></span></h3>
            <p id="error-message" class="error"></p>
        </div>
    </div>

    <script>
        async function calculate() {
            const num1 = document.getElementById('num1').value;
            const num2 = document.getElementById('num2').value;
            const operation = document.getElementById('operation').value;

            const resultContainer = document.getElementById('result-container');
            const resultValue = document.getElementById('result-value');
            const errorMessage = document.getElementById('error-message');

            if (num1 === '' || num2 === '') {
                showError("Please enter both numbers");
                return;
            }

            try {
                const response = await fetch(`/api/calculate?num1=${num1}&num2=${num2}&operation=${operation}`);
                const data = await response.json();

                resultContainer.style.display = 'block';

                if (data.error) {
                    showError(data.error);
                } else {
                    errorMessage.innerText = '';
                    resultValue.innerText = data.result;
                    resultValue.style.color = '#10b981';
                }
            } catch (error) {
                showError("Error connecting to server.");
            }
        }

        function showError(msg) {
            document.getElementById('result-value').innerText = '';
            const errorEl = document.getElementById('error-message');
            errorEl.innerText = msg;
            errorEl.style.display = 'block';
        }
    </script>
</body>

</html>
